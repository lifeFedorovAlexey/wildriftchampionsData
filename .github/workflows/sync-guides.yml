name: Sync WildriftFire Guides

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

concurrency:
  group: sync-wildriftfire-guides
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Sync guides to WR API
        env:
          GUIDES_SYNC_API_ORIGIN: ${{ secrets.GUIDES_SYNC_API_ORIGIN }}
          GUIDES_SYNC_IMPORT_URL: ${{ secrets.GUIDES_SYNC_IMPORT_URL }}
          GUIDES_SYNC_SECRET: ${{ secrets.GUIDES_SYNC_SECRET }}
          API_PROXY_TARGET: ${{ secrets.GUIDES_SYNC_API_ORIGIN }}
          STATS_API_ORIGIN: ${{ secrets.GUIDES_SYNC_API_ORIGIN }}
        run: npm run sync:guides:all -- --no-write-local
