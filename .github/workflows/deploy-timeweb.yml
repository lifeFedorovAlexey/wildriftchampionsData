name: Deploy UI To Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ui-timeweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_PUBLIC_BASE_URL: ${{ vars.S3_PUBLIC_BASE_URL }}
      S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE }}
      ASSET_PUBLIC_MODE: ${{ vars.ASSET_PUBLIC_MODE }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ vars.S3_PUBLIC_BASE_URL }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE }}
          ASSET_PUBLIC_MODE: ${{ vars.ASSET_PUBLIC_MODE }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          debug: true
          script: |
            set -e
            upsert_env_if_present() {
              key="$1"
              value="$2"
              file="$3"
              if [ -z "$value" ]; then
                echo "skip empty env: $key"
                return 0
              fi
              touch "$file"
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '%s\n' "${key}=${value}" >> "$file"
              fi
            }
            restore_env_from_pm2() {
              key="$1"
              file="$2"
              value="$(node -e 'const key = process.argv[1]; const { execSync } = require("child_process"); try { const list = JSON.parse(execSync("pm2 jlist", { encoding: "utf8" })); const proc = list.find((entry) => entry.name === "wr-api"); const env = proc?.pm2_env?.env || proc?.pm2_env || {}; const value = env[key]; if (value) process.stdout.write(String(value)); } catch {}' "$key")"
              upsert_env_if_present "$key" "$value" "$file"
            }
            cd /var/www/wr-api
            git stash push --include-untracked -m "deploy-api-from-ui-$(date +%s)" || true
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            upsert_env_if_present S3_ENDPOINT "${S3_ENDPOINT}" .env
            upsert_env_if_present S3_BUCKET "${S3_BUCKET}" .env
            upsert_env_if_present S3_ACCESS_KEY_ID "${S3_ACCESS_KEY_ID}" .env
            upsert_env_if_present S3_SECRET_ACCESS_KEY "${S3_SECRET_ACCESS_KEY}" .env
            upsert_env_if_present S3_PUBLIC_BASE_URL "${S3_PUBLIC_BASE_URL}" .env
            upsert_env_if_present S3_FORCE_PATH_STYLE "${S3_FORCE_PATH_STYLE}" .env
            upsert_env_if_present ASSET_PUBLIC_MODE "${ASSET_PUBLIC_MODE}" .env
            restore_env_from_pm2 DATABASE_URL .env
            restore_env_from_pm2 S3_ENDPOINT .env
            restore_env_from_pm2 S3_BUCKET .env
            restore_env_from_pm2 S3_ACCESS_KEY_ID .env
            restore_env_from_pm2 S3_SECRET_ACCESS_KEY .env
            restore_env_from_pm2 S3_PUBLIC_BASE_URL .env
            restore_env_from_pm2 S3_FORCE_PATH_STYLE .env
            restore_env_from_pm2 ASSET_PUBLIC_MODE .env
            npm ci
            node ./scripts/backfill-guide-hero-media.mjs
            pm2 delete wr-api || true
            pm2 start npm --name wr-api --cwd /var/www/wr-api -- start
            pm2 save
            cd /var/www/wildriftchampionsData
            git stash push --include-untracked -m "deploy-ui-$(date +%s)" || true
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            cd /var/www/wildriftchampionsData/ui
            touch .env.production.local
            if grep -q '^S3_PUBLIC_BASE_URL=' .env.production.local; then
              sed -i "s|^S3_PUBLIC_BASE_URL=.*|S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}|" .env.production.local
            else
              printf '%s\n' "S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}" >> .env.production.local
            fi
            rm -rf node_modules .next
            npm ci
            npm run build
            pm2 delete wildrift-ui || true
            pm2 start npm --name wildrift-ui --cwd /var/www/wildriftchampionsData/ui -- start
            pm2 save
          envs: S3_ENDPOINT,S3_BUCKET,S3_PUBLIC_BASE_URL,S3_FORCE_PATH_STYLE,ASSET_PUBLIC_MODE,S3_ACCESS_KEY_ID,S3_SECRET_ACCESS_KEY
