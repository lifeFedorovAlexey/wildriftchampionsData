name: Deploy UI To Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ui-timeweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          script_stop: true
          script: |
            set -e
            cd /var/www/wildriftchampionsData
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            cd /var/www/wildriftchampionsData/ui
            npm ci
            npm run build
            pm2 restart wildrift-ui --update-env
            pm2 save
