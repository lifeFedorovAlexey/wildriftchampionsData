name: Deploy UI To Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ui-timeweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      S3_PUBLIC_BASE_URL: ${{ vars.S3_PUBLIC_BASE_URL }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          S3_PUBLIC_BASE_URL: ${{ vars.S3_PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          password: ${{ secrets.TIMEWEB_PASSWORD }}
          debug: true
          script: |
            set -e
            cd /var/www/wildriftchampionsData
            git stash push --include-untracked -m "deploy-ui-$(date +%s)" || true
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            cd /var/www/wildriftchampionsData/ui
            touch .env.production.local
            if grep -q '^S3_PUBLIC_BASE_URL=' .env.production.local; then
              sed -i "s|^S3_PUBLIC_BASE_URL=.*|S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}|" .env.production.local
            else
              printf '%s\n' "S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}" >> .env.production.local
            fi
            npm ci
            npm run build
            pm2 delete wildrift-ui || true
            pm2 start npm --name wildrift-ui --cwd /var/www/wildriftchampionsData/ui -- start
            pm2 save
          envs: S3_PUBLIC_BASE_URL
