name: UI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy UI after checks
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "30 4 * * 1"

concurrency:
  group: ui-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  security:
    name: Security Audit
    uses: ./.github/workflows/security-audit.yml

  codeql:
    name: CodeQL
    uses: ./.github/workflows/codeql.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  deploy:
    name: Deploy UI To Timeweb
    needs:
      - ci
      - security
      - codeql
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    uses: ./.github/workflows/deploy-timeweb.yml
    secrets: inherit
