name: wr-chat Reusable

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
    inputs:
      deploy:
        description: Deploy wr-chat after checks
        required: false
        type: boolean
        default: false

concurrency:
  group: wr-chat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wr-chat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: wr-chat/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy wr-chat To Timeweb
    needs:
      - ci
    if: >-
      inputs.deploy &&
      secrets.TIMEWEB_CHAT_HOST != '' &&
      secrets.TIMEWEB_CHAT_USER != '' &&
      secrets.TIMEWEB_CHAT_PASSWORD != ''
    uses: ./.github/workflows/deploy-chat-timeweb.yml
    secrets: inherit
